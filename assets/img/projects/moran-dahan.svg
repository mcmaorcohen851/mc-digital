<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14122a"/><stop offset="1" stop-color="#0c0a18"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5d782"/><stop offset="1" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="640" height="400" fill="url(#bg)"/>
  <circle cx="90" cy="80" r="120" fill="#f5d782" opacity=".08"/>
  <circle cx="560" cy="330" r="130" fill="#8b5cf6" opacity=".12"/>

  <!-- dashboard frame -->
  <rect x="60" y="50" width="520" height="290" rx="14" fill="#0a0918" stroke="#f5d782" stroke-width="2"/>
  <text x="560" y="86" font-size="17" font-weight="bold" text-anchor="end" fill="#f5d782">מורן דהן ✦ תכשיטים</text>
  <circle cx="86" cy="80" r="6" fill="#34d399"/>
  <text x="100" y="85" font-size="12" fill="#a7a4c4">LIVE</text>

  <!-- KPI cards -->
  <g font-size="12">
    <rect x="84" y="106" width="150" height="60" rx="10" fill="#131126" stroke="#2c2852"/>
    <text x="214" y="128" text-anchor="end" fill="#a7a4c4">חשיפות</text>
    <text x="214" y="152" font-size="20" font-weight="bold" text-anchor="end" fill="#f4f3fb">128K</text>
    <rect x="246" y="106" width="150" height="60" rx="10" fill="#131126" stroke="#2c2852"/>
    <text x="376" y="128" text-anchor="end" fill="#a7a4c4">קליקים</text>
    <text x="376" y="152" font-size="20" font-weight="bold" text-anchor="end" fill="#22d3ee">3,240</text>
    <rect x="408" y="106" width="150" height="60" rx="10" fill="#131126" stroke="#f5d782"/>
    <text x="538" y="128" text-anchor="end" fill="#a7a4c4">מכירות</text>
    <text x="538" y="152" font-size="20" font-weight="bold" text-anchor="end" fill="#f5d782">₪18.4K</text>
  </g>

  <!-- bar chart -->
  <g>
    <rect x="100" y="250" width="34" height="60" rx="5" fill="url(#g)" opacity=".55"/>
    <rect x="150" y="230" width="34" height="80" rx="5" fill="url(#g)" opacity=".65"/>
    <rect x="200" y="242" width="34" height="68" rx="5" fill="url(#g)" opacity=".6"/>
    <rect x="250" y="210" width="34" height="100" rx="5" fill="url(#g)" opacity=".75"/>
    <rect x="300" y="196" width="34" height="114" rx="5" fill="url(#g)" opacity=".85"/>
    <rect x="350" y="222" width="34" height="88" rx="5" fill="url(#g)" opacity=".7"/>
    <rect x="400" y="182" width="34" height="128" rx="5" fill="url(#gold)"/>
    <rect x="450" y="168" width="34" height="142" rx="5" fill="url(#gold)"/>
    <rect x="500" y="188" width="34" height="122" rx="5" fill="url(#gold)" opacity=".85"/>
  </g>
  <line x1="84" y1="310" x2="556" y2="310" stroke="#2c2852" stroke-width="2"/>

  <!-- trend arrow -->
  <g transform="translate(120 196)">
    <rect width="96" height="34" rx="17" fill="#0f0d20" stroke="#34d399" stroke-width="2"/>
    <text x="48" y="23" font-size="15" font-weight="bold" text-anchor="middle" fill="#34d399">ROAS ↑ 3.1</text>
  </g>

  <text x="320" y="378" font-size="15" font-weight="bold" text-anchor="middle" fill="#f5d782">קמפיין Meta + דשבורד אנליטיקס בזמן אמת</text>
</svg>
