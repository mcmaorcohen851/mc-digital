<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14122a"/><stop offset="1" stop-color="#0c0a18"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5d782"/><stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
  </defs>
  <rect width="640" height="400" fill="url(#bg)"/>
  <circle cx="90" cy="70" r="130" fill="#8b5cf6" opacity=".13"/>
  <circle cx="560" cy="340" r="140" fill="#f472b6" opacity=".10"/>

  <!-- brand -->
  <text x="320" y="70" font-size="34" font-weight="900" text-anchor="middle" fill="url(#g)" letter-spacing="10">LUXORA</text>
  <text x="320" y="94" font-size="12" text-anchor="middle" fill="#a7a4c4" letter-spacing="4">LUXURY DEALS</text>

  <!-- glass product cards -->
  <g transform="translate(96 130) rotate(-4)">
    <rect width="140" height="180" rx="14" fill="rgba(255,255,255,.05)" stroke="#3f3a6e" stroke-width="1.5"/>
    <rect x="16" y="16" width="108" height="90" rx="8" fill="#1c1936"/>
    <text x="70" y="72" font-size="34" text-anchor="middle">👜</text>
    <rect x="16" y="118" width="80" height="7" rx="3.5" fill="#3f3a6e"/>
    <rect x="16" y="132" width="55" height="7" rx="3.5" fill="#2c2852"/>
    <text x="16" y="164" font-size="16" font-weight="bold" fill="#22d3ee">₪249</text>
  </g>
  <g transform="translate(250 118)">
    <rect width="150" height="196" rx="14" fill="rgba(255,255,255,.07)" stroke="url(#g)" stroke-width="2.5"/>
    <rect x="16" y="16" width="118" height="98" rx="8" fill="#1c1936"/>
    <text x="75" y="80" font-size="38" text-anchor="middle">⌚</text>
    <rect x="16" y="128" width="90" height="7" rx="3.5" fill="#4c4685"/>
    <rect x="16" y="142" width="60" height="7" rx="3.5" fill="#332e5e"/>
    <text x="16" y="178" font-size="18" font-weight="bold" fill="#22d3ee">₪399</text>
    <rect x="92" y="160" width="44" height="22" rx="11" fill="url(#gold)"/>
    <text x="114" y="175" font-size="11" font-weight="bold" text-anchor="middle" fill="#08060f">HOT</text>
  </g>
  <g transform="translate(418 130) rotate(4)">
    <rect width="140" height="180" rx="14" fill="rgba(255,255,255,.05)" stroke="#3f3a6e" stroke-width="1.5"/>
    <rect x="16" y="16" width="108" height="90" rx="8" fill="#1c1936"/>
    <text x="70" y="72" font-size="34" text-anchor="middle">👟</text>
    <rect x="16" y="118" width="80" height="7" rx="3.5" fill="#3f3a6e"/>
    <rect x="16" y="132" width="55" height="7" rx="3.5" fill="#2c2852"/>
    <text x="16" y="164" font-size="16" font-weight="bold" fill="#22d3ee">₪189</text>
  </g>

  <text x="320" y="372" font-size="15" font-weight="bold" text-anchor="middle" fill="#8b5cf6">קטלוג אפיליאציה · עיצוב ניאון-זכוכית</text>
</svg>
