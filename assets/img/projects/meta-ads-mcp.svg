<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14122a"/><stop offset="1" stop-color="#0c0a18"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="640" height="400" fill="url(#bg)"/>
  <circle cx="560" cy="80" r="130" fill="#22d3ee" opacity=".10"/>
  <circle cx="70" cy="340" r="120" fill="#8b5cf6" opacity=".12"/>

  <!-- terminal window -->
  <rect x="70" y="60" width="500" height="240" rx="14" fill="#0a0918" stroke="url(#g)" stroke-width="2.5"/>
  <rect x="70" y="60" width="500" height="38" rx="14" fill="#131126"/>
  <rect x="70" y="84" width="500" height="14" fill="#131126"/>
  <circle cx="100" cy="79" r="6" fill="#f472b6"/>
  <circle cx="120" cy="79" r="6" fill="#f5d782"/>
  <circle cx="140" cy="79" r="6" fill="#34d399"/>
  <text x="540" y="84" font-size="13" text-anchor="end" fill="#a7a4c4">meta-ads-mcp</text>

  <g font-size="14" direction="ltr">
    <text x="95" y="130" fill="#22d3ee">&gt; mcp.call("list_campaigns")</text>
    <text x="95" y="156" fill="#a7a4c4">✓ 3 campaigns active · budget ₪30/day</text>
    <text x="95" y="182" fill="#22d3ee">&gt; mcp.call("get_insights")</text>
    <text x="95" y="208" fill="#34d399">✓ CTR 2.4% ↑ · CPC ₪0.82 ↓ · ROAS 3.1x</text>
    <text x="95" y="234" fill="#22d3ee">&gt; mcp.call("optimize_budget")</text>
    <text x="95" y="260" fill="#f5d782">⚡ AI rebalancing… done in 1.2s</text>
    <text x="95" y="284" fill="#8b5cf6">_</text>
  </g>

  <!-- connection nodes -->
  <g stroke="#8b5cf6" stroke-width="1.5" opacity=".8">
    <line x1="180" y1="330" x2="320" y2="352"/>
    <line x1="320" y1="352" x2="460" y2="330"/>
  </g>
  <g font-size="12" font-family="Arial" text-anchor="middle">
    <circle cx="180" cy="330" r="17" fill="#0f0d20" stroke="#8b5cf6" stroke-width="2"/>
    <text x="180" y="335" fill="#8b5cf6" font-weight="bold">AI</text>
    <circle cx="320" cy="352" r="17" fill="#0f0d20" stroke="#22d3ee" stroke-width="2"/>
    <text x="320" y="357" fill="#22d3ee" font-weight="bold">MCP</text>
    <circle cx="460" cy="330" r="17" fill="#0f0d20" stroke="#f472b6" stroke-width="2"/>
    <text x="460" y="335" fill="#f472b6" font-weight="bold">f</text>
  </g>

  <text x="320" y="390" font-size="14" font-weight="bold" font-family="Arial" text-anchor="middle" fill="#8b5cf6">Meta Ads MCP — קמפיינים בפקודה אחת</text>
</svg>
