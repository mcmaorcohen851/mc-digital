<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1626"/><stop offset="1" stop-color="#0a1a14"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/><stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="640" height="400" fill="url(#bg)"/>
  <circle cx="540" cy="70" r="130" fill="#34d399" opacity=".12"/>
  <circle cx="90" cy="330" r="120" fill="#8b5cf6" opacity=".12"/>

  <!-- ground -->
  <ellipse cx="320" cy="330" rx="240" ry="36" fill="#123524" opacity=".8"/>

  <!-- magic plant -->
  <g filter="url(#glow)">
    <path d="M320 320 C320 250 300 230 320 170" fill="none" stroke="url(#leaf)" stroke-width="7" stroke-linecap="round"/>
    <path d="M320 250 C290 240 275 220 272 196 C300 200 316 218 320 240 Z" fill="url(#leaf)"/>
    <path d="M320 220 C350 210 365 190 368 166 C340 170 324 188 320 210 Z" fill="url(#leaf)"/>
    <circle cx="320" cy="152" r="26" fill="#f472b6"/>
    <circle cx="320" cy="152" r="13" fill="#f5d782"/>
  </g>

  <!-- eggs -->
  <g transform="translate(200 280)">
    <ellipse cx="0" cy="0" rx="26" ry="33" fill="#1c1936" stroke="#8b5cf6" stroke-width="2.5"/>
    <path d="M-26 -4 l10 8 l10 -10 l12 10 l10 -8" fill="none" stroke="#8b5cf6" stroke-width="2"/>
  </g>
  <g transform="translate(444 276)">
    <ellipse cx="0" cy="0" rx="28" ry="36" fill="#132c22" stroke="#34d399" stroke-width="2.5"/>
    <path d="M-28 -5 l11 9 l11 -11 l13 11 l11 -9" fill="none" stroke="#34d399" stroke-width="2"/>
    <circle cx="10" cy="-14" r="4" fill="#f5d782" filter="url(#glow)"/>
  </g>

  <!-- sparkles -->
  <g fill="#f5d782" filter="url(#glow)">
    <path d="M150 120 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4 z"/>
    <path d="M480 150 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z"/>
    <path d="M380 90 l3 7 7 3 -7 3 -3 7 -3 -7 -7 -3 7 -3 z"/>
  </g>

  <!-- streak badge -->
  <g transform="translate(80 90)">
    <rect width="118" height="42" rx="21" fill="#0f0d20" stroke="#f5d782" stroke-width="2"/>
    <text x="59" y="27" font-size="15" font-weight="bold" text-anchor="middle" fill="#f5d782">🔥 יום 7</text>
  </g>

  <text x="320" y="384" font-size="15" font-weight="bold" text-anchor="middle" fill="#34d399">Magic Garden — אסוף, גדל, שתף</text>
</svg>
