<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14122a"/><stop offset="1" stop-color="#0c0a18"/>
    </linearGradient>
    <linearGradient id="trend" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="640" height="400" fill="url(#bg)"/>
  <circle cx="100" cy="80" r="120" fill="#22d3ee" opacity=".08"/>
  <circle cx="560" cy="320" r="130" fill="#8b5cf6" opacity=".10"/>

  <!-- grid -->
  <g stroke="#1c1936" stroke-width="1">
    <line x1="70" y1="90" x2="580" y2="90"/><line x1="70" y1="150" x2="580" y2="150"/>
    <line x1="70" y1="210" x2="580" y2="210"/><line x1="70" y1="270" x2="580" y2="270"/>
    <line x1="70" y1="330" x2="580" y2="330"/>
  </g>

  <!-- candles -->
  <g stroke-width="2">
    <line x1="110" y1="240" x2="110" y2="310" stroke="#f472b6"/><rect x="100" y="255" width="20" height="40" rx="3" fill="#f472b6"/>
    <line x1="150" y1="225" x2="150" y2="295" stroke="#34d399"/><rect x="140" y="240" width="20" height="38" rx="3" fill="#34d399"/>
    <line x1="190" y1="200" x2="190" y2="270" stroke="#34d399"/><rect x="180" y="214" width="20" height="42" rx="3" fill="#34d399"/>
    <line x1="230" y1="215" x2="230" y2="280" stroke="#f472b6"/><rect x="220" y="230" width="20" height="34" rx="3" fill="#f472b6"/>
    <line x1="270" y1="185" x2="270" y2="255" stroke="#34d399"/><rect x="260" y="200" width="20" height="40" rx="3" fill="#34d399"/>
    <line x1="310" y1="160" x2="310" y2="230" stroke="#34d399"/><rect x="300" y="175" width="20" height="42" rx="3" fill="#34d399"/>
    <line x1="350" y1="175" x2="350" y2="240" stroke="#f472b6"/><rect x="340" y="190" width="20" height="34" rx="3" fill="#f472b6"/>
    <line x1="390" y1="145" x2="390" y2="215" stroke="#34d399"/><rect x="380" y="160" width="20" height="40" rx="3" fill="#34d399"/>
    <line x1="430" y1="120" x2="430" y2="190" stroke="#34d399"/><rect x="420" y="134" width="20" height="42" rx="3" fill="#34d399"/>
    <line x1="470" y1="135" x2="470" y2="198" stroke="#f472b6"/><rect x="460" y="148" width="20" height="34" rx="3" fill="#f472b6"/>
    <line x1="510" y1="105" x2="510" y2="175" stroke="#34d399"/><rect x="500" y="120" width="20" height="40" rx="3" fill="#34d399"/>
  </g>

  <!-- glowing trend line -->
  <path d="M90 300 C180 280 240 235 320 205 S470 130 560 105" fill="none" stroke="url(#trend)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="560" cy="105" r="7" fill="#22d3ee" filter="url(#glow)"/>

  <!-- badges -->
  <g transform="translate(88 96)">
    <rect width="126" height="40" rx="20" fill="#0f0d20" stroke="#34d399" stroke-width="2"/>
    <text x="63" y="26" font-size="15" font-weight="bold" text-anchor="middle" fill="#34d399">+9.2% CAGR</text>
  </g>
  <g transform="translate(440 240)" direction="ltr">
    <rect width="120" height="40" rx="20" fill="#0f0d20" stroke="#8b5cf6" stroke-width="2"/>
    <text x="60" y="26" font-size="14" font-weight="bold" text-anchor="middle" fill="#8b5cf6">BOT: ACTIVE</text>
  </g>

  <text x="320" y="378" font-size="15" font-weight="bold" text-anchor="middle" fill="#22d3ee">מסחר אלגוריתמי — Python · MQL5 · Pine</text>
</svg>
